[workspace]
name = "jinja2"
version = "0.1.0"
description = "A Mojo implementation of the Jinja2 subset for chat templates"
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
platforms = ["osx-arm64"]

[tasks]
build = "mojo build src/main.mojo -o build/jinja2"
conformance = "python tests/test_conformance.py"

[dependencies]
mojo = "==1.0.0b3.dev2026061206"
python = ">=3.11"
jinja2 = "*"
